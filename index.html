<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="vista1">
        <a href="#" onclick="mostrar('vista2')">DESPIERTA</a>
    </div>

    <div id="vista2" style="display:none;">
        <img src="assets/imgprueb.jpeg" style="max-width:100%;">
        <br>
        <a href="#" onclick="mostrar('vista3')">🌅 LEVÁNTATE</a>
        &nbsp;&nbsp;
        <a href="#" onclick="mostrar('vista4')">😴 IGNORAR</a>
    </div>

    <div id="vista3" style="display:none;">
        <img src="assets/levantate.jpeg" style="max-width:100%;">
        <br>
        <a href="#" onclick="mostrar('vista1')">⬅ Regresar</a>
    </div>

    <div id="vista4" style="display:none;">
        <img src="assets/ignorar.jpeg" style="max-width:100%;">
        <br>
        <a href="#" onclick="mostrar('vista1')">⬅ Regresar</a>
    </div>

    <script>
        function mostrar(id) {
            document.querySelectorAll('div').forEach(d => d.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>

</body>
</html>
